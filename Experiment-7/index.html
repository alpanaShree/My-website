<!DOCTYPE html>
<html>
<head>
<title>Advanced Professional Registration</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background: linear-gradient(135deg,#667eea,#764ba2,#6dd5ed);
  padding:20px;
  flex-direction:column;
}

.form-box{
  background:#ffffff;
  width:600px;
  max-height:95vh;
  overflow-y:auto;
  padding:30px;
  border-radius:12px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

label{
  display:block;
  margin-top:14px;
  font-size:14px;
  font-weight:600;
}

input, select, textarea{
  width:100%;
  padding:9px;
  margin-top:5px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:14px;
}

input:focus, select:focus, textarea:focus{
  border-color:#667eea;
  outline:none;
}

textarea{ resize:vertical; }

.inline{
  display:flex;
  gap:15px;
  margin-top:5px;
}

.inline input{ width:auto; }

.password-container{ position:relative; }

.eye-icon{
  position:absolute;
  right:10px;
  top:35px;
  cursor:pointer;
  font-size:18px;
}

.strength-bar{
  height:6px;
  border-radius:4px;
  margin-top:5px;
}

.match-message{
  font-size:12px;
  margin-top:4px;
}

.error{
  color:red;
  font-size:12px;
}

.success{
  color:green;
  font-weight:bold;
  text-align:center;
  margin-top:15px;
}

button{
  width:100%;
  padding:12px;
  margin-top:20px;
  border:none;
  border-radius:8px;
  background:#667eea;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#5a67d8;
}

.preview-img{
  margin-top:10px;
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:50%;
  border:2px solid #667eea;
}

table{
  margin-top:30px;
  border-collapse:collapse;
  width:95%;
  background:white;
}

th, td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
  font-size:12px;
}

th{
  background:#667eea;
  color:white;
}

.action-btn{
  width:auto;
  margin:10px 5px;
  padding:8px 15px;
}
</style>
</head>

<body>

<div class="form-box">
<form id="myForm">

<h2>Professional Registration</h2>

<label>Profile Picture *</label>
<input type="file" id="profilePic" accept="image/*">
<img id="preview" class="preview-img" style="display:none;">
<div class="error" id="picError"></div>

<label>Full Name *</label>
<input type="text" id="fullName">
<div class="error" id="nameError"></div>

<label>Email *</label>
<input type="email" id="email">
<div class="error" id="emailError"></div>

<label>Contact Number *</label>
<input type="tel" id="contact" placeholder="10-digit number">
<div class="error" id="contactError"></div>

<label>Date of Birth *</label>
<input type="date" id="dob">
<div class="error" id="dobError"></div>

<label>Age (Auto Calculated)</label>
<input type="number" id="age" readonly>

<label>Gender *</label>
<div class="inline">
  <label><input type="radio" name="gender" value="Male"> Male</label>
  <label><input type="radio" name="gender" value="Female"> Female</label>
  <label><input type="radio" name="gender" value="Other"> Other</label>
</div>
<div class="error" id="genderError"></div>

<label>Country *</label>
<select id="country">
<option value="">Select Country</option>
<option>Nepal</option>
<option>India</option>
<option>Bangladesh</option>
<option>Bhutan</option>
<option>Sri Lanka</option>
<option>Maldives</option>
<option>China</option>
<option>Japan</option>
<option>USA</option>
<option>UK</option>
<option>Canada</option>
<option>Australia</option>
<option>Germany</option>
<option>France</option>
<option>Brazil</option>
<option>South Korea</option>
<option>Italy</option>
<option>Spain</option>
<option>Thailand</option>
<option>Singapore</option>
<option>Malaysia</option>
</select>
<div class="error" id="countryError"></div>

<label>Primary Skill *</label>
<input type="text" id="skill">
<div class="error" id="skillError"></div>

<label>Years of Experience *</label>
<input type="number" id="experience" min="0">
<div class="error" id="experienceError"></div>

<label>Upload Resume (PDF/DOC/DOCX) *</label>
<input type="file" id="resume" accept=".pdf,.doc,.docx">
<div class="error" id="resumeError"></div>

<label>Password *</label>
<div class="password-container">
  <input type="password" id="password">
  <span class="eye-icon" onclick="togglePassword('password', this)">👁️</span>
</div>
<div class="strength-bar" id="strengthBar"></div>
<div class="error" id="passwordError"></div>

<label>Confirm Password *</label>
<div class="password-container">
  <input type="password" id="confirmPassword">
  <span class="eye-icon" onclick="togglePassword('confirmPassword', this)">👁️</span>
</div>
<div class="match-message" id="matchMessage"></div>
<div class="error" id="confirmError"></div>

<label>
<input type="checkbox" id="agree"> I agree to Terms & Conditions *
</label>
<div class="error" id="agreeError"></div>

<button type="submit">Register</button>
<div class="success" id="successMessage"></div>

</form>
</div>

<button class="action-btn" onclick="copyTable()">Copy</button>
<button class="action-btn" onclick="downloadCSV()">Download</button>

<table id="dataTable">
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Contact</th>
<th>Age</th>
<th>Gender</th>
<th>Country</th>
<th>Skill</th>
<th>Experience</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let formDataArray = [];

/* FIXED AGE CALCULATOR */
document.getElementById("dob").addEventListener("change", function(){
  const birthDate = new Date(this.value);
  const today = new Date();

  if(!this.value){
    document.getElementById("age").value="";
    return;
  }

  let age = today.getFullYear() - birthDate.getFullYear();
  const monthDiff = today.getMonth() - birthDate.getMonth();

  if(monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())){
    age--;
  }

  document.getElementById("age").value = age >= 0 ? age : "";
});

/* STORE DATA + PRINT TABLE */
document.getElementById("myForm").addEventListener("submit", function(e){
  e.preventDefault();

  const gender = document.querySelector('input[name="gender"]:checked')?.value || "";

  const data = {
    name: fullName.value,
    email: email.value,
    contact: contact.value,
    age: age.value,
    gender: gender,
    country: country.value,
    skill: skill.value,
    experience: experience.value
  };

  formDataArray.push(data);
  renderTable();
  this.reset();
  document.getElementById("age").value="";
});

/* TABLE RENDER */
function renderTable(){
  const tbody = document.querySelector("#dataTable tbody");
  tbody.innerHTML="";

  formDataArray.forEach(row=>{
    tbody.innerHTML += `
      <tr>
        <td>${row.name}</td>
        <td>${row.email}</td>
        <td>${row.contact}</td>
        <td>${row.age}</td>
        <td>${row.gender}</td>
        <td>${row.country}</td>
        <td>${row.skill}</td>
        <td>${row.experience}</td>
      </tr>
    `;
  });
}

/* COPY TABLE */
function copyTable(){
  let text="";
  formDataArray.forEach(row=>{
    text += `${row.name}, ${row.email}, ${row.contact}, ${row.age}, ${row.gender}, ${row.country}, ${row.skill}, ${row.experience}\n`;
  });

  navigator.clipboard.writeText(text);
  alert("Copied!");
}

/* DOWNLOAD CSV (Excel Ready) */
function downloadCSV(){
  let csv="Name,Email,Contact,Age,Gender,Country,Skill,Experience\n";

  formDataArray.forEach(row=>{
    csv += `${row.name},${row.email},${row.contact},${row.age},${row.gender},${row.country},${row.skill},${row.experience}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "registration_data.csv";
  a.click();
  URL.revokeObjectURL(url);
}

</script>

</body>
</html>
